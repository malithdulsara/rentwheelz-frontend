<header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200">
    <div class="relative">
        <span class="text-sm font-medium text-slate-500 uppercase tracking-wider">Welcome back!</span>
    </div>

    <div class="flex items-center gap-x-5">
        <div class="flex flex-col items-end mr-2">
            <!-- <span class="text-sm font-semibold text-slate-800 leading-tight">User Name</span> -->
            <span class="text-xs text-blue-600 font-medium capitalize">{{ userRole?.replace('ROLE_', '') }}</span>
        </div>
        
        <button (click)="logout()" 
                class="px-4 py-2 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors duration-200">
            Log Out
        </button>
    </div>
</header>
